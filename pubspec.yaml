name: sacred_app
description: "Gevabal.mn — Buddhist monk booking platform"
publish_to: 'none'
version: 2.1.0+25

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Video call (custom UI — flutter_livekit_components not on pub.dev)
  livekit_client: ^2.1.0
  flutter_webrtc: 0.12.12+hotfix.1

  # Push notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^16.3.0

  # Media
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7

  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  cupertino_icons: ^1.0.6

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  url_launcher: ^6.2.0
  pdf: ^3.11.0
  printing: ^5.13.0
  path_provider: ^2.1.0
  fl_chart: ^0.68.0
  excel: ^4.0.2
  animations: ^2.0.11
  google_fonts: ^6.3.2

# livekit_client → connectivity_plus 6.x crashes on iOS 26 at plugin registration.
dependency_overrides:
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#F3EDE4"
  adaptive_icon_foreground: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/
