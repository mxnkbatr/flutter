# Gevabal.mn — Codemagic CI/CD (YAML configuration)
# Codemagic UI: Application settings → Switch to YAML configuration
# Docs: https://docs.codemagic.io/flutter-configuration/flutter-projects/
#
# Required Codemagic env group "code-signing" (Application or Team → Environment variables):
#   CERTIFICATE_PRIVATE_KEY              — RSA private key (Secret)
#   APP_STORE_CONNECT_PRIVATE_KEY        — .p8 API key file contents (Secret)
#   APP_STORE_CONNECT_KEY_IDENTIFIER     — Key ID from App Store Connect
#   APP_STORE_CONNECT_ISSUER_ID          — Issuer ID from App Store Connect

definitions:
  env_versions: &env_versions
    flutter: stable
    xcode: latest
    cocoapods: default
    java: 17

  flutter_setup: &flutter_setup
    name: Flutter setup
    script: |
      flutter pub get
      flutter --version

  firebase_setup: &firebase_setup
    name: Firebase config files
    script: |
      # Client configs (also in repo under android/ and ios/Runner/)
      if [ -n "$GOOGLE_SERVICES_JSON" ]; then
        echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
      fi
      if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
        echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
      fi

  ios_keychain_init: &ios_keychain_init
    name: Set up keychain for code signing
    script: keychain initialize

  ios_fetch_signing: &ios_fetch_signing
    name: Fetch iOS signing files from Apple
    script: app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

  ios_add_certificates: &ios_add_certificates
    name: Add certificates to keychain
    script: keychain add-certificates

  ios_signing_setup: &ios_signing_setup
    name: Set up code signing settings on Xcode project
    script: xcode-project use-profiles

  ios_build: &ios_build
    name: Build Flutter iOS IPA
    script: |
      cd ios && pod install && cd ..
      flutter build ipa --release \
        --export-options-plist=/Users/builder/export_options.plist \
        --dart-define=API_BASE_URL="${API_BASE_URL:-https://geva-api.onrender.com/api}" \
        --dart-define=PREFER_DEV_AUTH=false

workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      <<: *env_versions
      groups:
        - code-signing
      vars:
        BUNDLE_ID: mn.gevabal.app
        API_BASE_URL: https://geva-api.onrender.com/api
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - *flutter_setup
      - *firebase_setup
      - *ios_keychain_init
      - *ios_fetch_signing
      - *ios_add_certificates
      - *ios_signing_setup
      - *ios_build
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release AAB
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      <<: *env_versions
      vars:
        API_BASE_URL: https://geva-api.onrender.com/api
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - *flutter_setup
      - *firebase_setup
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL="${API_BASE_URL:-https://geva-api.onrender.com/api}" \
            --dart-define=PREFER_DEV_AUTH=false
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/flutter-apk/app-release.apk
