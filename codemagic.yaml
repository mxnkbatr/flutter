# Gevabal.mn — Codemagic CI/CD
#
# Environment group "code-signing" (Application → Environment variables):
#
#   1) CERTIFICATE_PRIVATE_KEY (Secret)
#   2) APP_STORE_CONNECT_PRIVATE_KEY (Secret) — App Store Connect .p8 файлын бүтэн текст
#   3) APP_STORE_CONNECT_KEY_IDENTIFIER — Key ID
#   4) APP_STORE_CONNECT_ISSUER_ID — Issuer ID
#
# Firebase config: repo-д commit хийгдсэн (ios/Runner/GoogleService-Info.plist,
# android/app/google-services.json). Дахин тохируулах бол (заавал биш):
#   GOOGLE_SERVICE_INFO_PLIST — base64(GoogleService-Info.plist)
#   GOOGLE_SERVICES_JSON — base64(google-services.json)
#
# Flutter dart-define (codemagic.yaml vars-д байна):
#   API_BASE_URL=https://geva-backend.onrender.com/api
#   PREFER_DEV_AUTH=false

definitions:
  env_versions: &env_versions
    flutter: stable
    xcode: latest
    cocoapods: default
    java: 17

  flutter_setup: &flutter_setup
    name: Flutter setup
    script: |
      flutter pub get
      flutter --version

  firebase_setup: &firebase_setup
    name: Firebase config files
    script: |
      set -e
      if [ ! -f android/app/google-services.json ] && [ -n "$GOOGLE_SERVICES_JSON" ]; then
        echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
      fi
      if [ ! -f ios/Runner/GoogleService-Info.plist ] && [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
        echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
      fi
      if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
        echo "ERROR: ios/Runner/GoogleService-Info.plist байхгүй."
        exit 1
      fi
      if [ ! -f android/app/google-services.json ]; then
        echo "ERROR: android/app/google-services.json байхгүй."
        exit 1
      fi
      echo "Firebase iOS bundle: $(/usr/libexec/PlistBuddy -c 'Print :BUNDLE_ID' ios/Runner/GoogleService-Info.plist)"
      echo "Firebase iOS app id: $(/usr/libexec/PlistBuddy -c 'Print :GOOGLE_APP_ID' ios/Runner/GoogleService-Info.plist)"

  ios_signing: &ios_signing
    name: Fetch signing files and set up code signing
    script: |
      set -e
      BUNDLE_ID="${BUNDLE_ID:-mn.gevabal.app}"
      missing=""
      [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ] && missing="CERTIFICATE_PRIVATE_KEY"
      [ -z "${APP_STORE_CONNECT_PRIVATE_KEY:-}" ] && missing="${missing:+$missing, }APP_STORE_CONNECT_PRIVATE_KEY"
      [ -z "${APP_STORE_CONNECT_KEY_IDENTIFIER:-}" ] && missing="${missing:+$missing, }APP_STORE_CONNECT_KEY_IDENTIFIER"
      [ -z "${APP_STORE_CONNECT_ISSUER_ID:-}" ] && missing="${missing:+$missing, }APP_STORE_CONNECT_ISSUER_ID"
      if [ -n "$missing" ]; then
        echo "ERROR: code-signing group-д дараах variable-ууд дутуу байна: $missing"
        echo "Codemagic → Application → Environment variables → group: code-signing"
        exit 1
      fi
      keychain initialize
      # Runner.entitlements has aps-environment; App Store profile must include Push Notifications.
      BUNDLE_ID_RESOURCE_ID="$(app-store-connect bundle-ids list \
        --bundle-id-identifier "$BUNDLE_ID" \
        --strict-match-identifier \
        --json \
        | python3 -c "import json,sys; items=json.load(sys.stdin); print(items[0]['id'] if items else '')")"
      if [ -z "$BUNDLE_ID_RESOURCE_ID" ]; then
        echo "ERROR: Bundle ID $BUNDLE_ID not found in Apple Developer portal."
        exit 1
      fi
      echo "Enabling Push Notifications on App ID $BUNDLE_ID ($BUNDLE_ID_RESOURCE_ID)"
      app-store-connect bundle-ids enable-capabilities "$BUNDLE_ID_RESOURCE_ID" \
        --capability "Push Notifications" || true
      app-store-connect bundle-ids profiles \
        --bundle-ids "$BUNDLE_ID_RESOURCE_ID" \
        --type IOS_APP_STORE \
        --json \
        | python3 -c "import json,sys; [print(p['id']) for p in json.load(sys.stdin)]" \
        | while read -r profile_id; do
          [ -n "$profile_id" ] || continue
          echo "Removing old App Store profile $profile_id (regenerate with push)"
          app-store-connect profiles delete "$profile_id" --ignore-not-found || true
        done
      app-store-connect fetch-signing-files "$BUNDLE_ID" \
        --type IOS_APP_STORE \
        --create \
        --delete-stale-profiles
      keychain add-certificates
      xcode-project use-profiles
      PROFILE_DIRS=(
        "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
        "$HOME/Library/MobileDevice/Provisioning Profiles"
      )
      PUSH_OK=false
      MATCHED_PROFILE=""
      for PROFILE_DIR in "${PROFILE_DIRS[@]}"; do
        [ -d "$PROFILE_DIR" ] || continue
        for PROFILE in "$PROFILE_DIR"/*.mobileprovision; do
          [ -f "$PROFILE" ] || continue
          DECODED="$(security cms -D -i "$PROFILE" 2>/dev/null || true)"
          echo "$DECODED" | grep -q "$BUNDLE_ID" || continue
          MATCHED_PROFILE="$(basename "$PROFILE")"
          if echo "$DECODED" | grep -qE 'aps-environment|com\.apple\.developer\.aps-environment'; then
            echo "OK: Provisioning profile includes Push Notifications ($MATCHED_PROFILE)"
            PUSH_OK=true
            break 2
          fi
        done
      done
      if [ -z "$MATCHED_PROFILE" ]; then
        echo "ERROR: No App Store profile found for $BUNDLE_ID."
        exit 1
      fi
      if [ "$PUSH_OK" != true ]; then
        echo "WARNING: aps-environment not found in $MATCHED_PROFILE (will rely on use-profiles export_options)."
        app-store-connect bundle-ids capabilities "$BUNDLE_ID_RESOURCE_ID" --json || true
      fi

  ios_build: &ios_build
    name: Build Flutter iOS IPA (Release only)
    script: |
      echo "=============================================="
      echo " GEVABAL RELEASE BUILD $(grep '^version:' pubspec.yaml)"
      echo " Using codemagic.yaml workflow: ios-app-store"
      echo "=============================================="
      set -euo pipefail
      export FLUTTER_BUILD_MODE=release
      flutter clean
      flutter pub get
      cd ios && pod install && cd ..
      flutter build ios --config-only --release \
        --dart-define=API_BASE_URL="${API_BASE_URL:-https://geva-backend.onrender.com/api}" \
        --dart-define=PREFER_DEV_AUTH=false
      if grep -q '^FLUTTER_BUILD_MODE=debug' ios/Flutter/Generated.xcconfig 2>/dev/null; then
        echo "ERROR: Generated.xcconfig is debug mode:"
        cat ios/Flutter/Generated.xcconfig
        exit 1
      fi
      if ! grep -q '^FLUTTER_BUILD_MODE=release' ios/Flutter/Release.xcconfig; then
        echo "ERROR: Release.xcconfig must force FLUTTER_BUILD_MODE=release"
        exit 1
      fi
      if grep -q '^TRACK_WIDGET_CREATION=true' ios/Flutter/Generated.xcconfig; then
        echo "ERROR: TRACK_WIDGET_CREATION=true indicates non-release build"
        exit 1
      fi
      echo "Release config OK (Flutter 3.44+ may omit FLUTTER_BUILD_MODE in Generated.xcconfig)"
      grep -E 'FLUTTER_BUILD_MODE|TRACK_WIDGET_CREATION|TREE_SHAKE_ICONS' ios/Flutter/Generated.xcconfig ios/Flutter/Release.xcconfig || true
      flutter build ios --release --no-codesign \
        --dart-define=API_BASE_URL="${API_BASE_URL:-https://geva-backend.onrender.com/api}" \
        --dart-define=PREFER_DEV_AUTH=false
      # use-profiles writes $HOME/export_options.plist with teamID + provisioningProfiles.
      # Do not overwrite it with ios/export_options.plist (that breaks push export).
      xcode-project use-profiles --project ios/Runner.xcodeproj
      xcode-project build-ipa \
        --workspace "${CM_BUILD_DIR:-$PWD}/ios/Runner.xcworkspace" \
        --scheme "${XCODE_SCHEME:-Runner}"
      IPA_PATH="$(find "${CM_BUILD_DIR:-$PWD}/build/ios/ipa" -name '*.ipa' -print -quit)"
      if [ -z "$IPA_PATH" ]; then
        echo "ERROR: IPA not found under build/ios/ipa"
        exit 1
      fi
      echo "Built IPA: $IPA_PATH"
      TMP_IPA="$(mktemp -d)"
      unzip -q "$IPA_PATH" -d "$TMP_IPA"
      FLUTTER_FW="$TMP_IPA/Payload/Runner.app/Frameworks/Flutter.framework/Flutter"
      if strings "$FLUTTER_FW" | grep -q "debug mode Flutter apps can only be launched"; then
        echo "ERROR: IPA contains Flutter DEBUG framework."
        rm -rf "$TMP_IPA"
        exit 1
      fi
      rm -rf "$TMP_IPA"
      echo "OK: IPA verified as Flutter RELEASE build"

workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      <<: *env_versions
      groups:
        - code-signing
      vars:
        BUNDLE_ID: mn.gevabal.app
        API_BASE_URL: https://geva-backend.onrender.com/api
        FLUTTER_BUILD_MODE: release
        XCODE_SCHEME: Runner
        XCODE_WORKSPACE: ios/Runner.xcworkspace
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - *flutter_setup
      - *firebase_setup
      - *ios_signing
      - *ios_build
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: true

  android-release:
    name: Android Release AAB
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      <<: *env_versions
      vars:
        API_BASE_URL: https://geva-backend.onrender.com/api
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - *flutter_setup
      - *firebase_setup
      - name: Android keystore (release signing)
        script: |
          set -euo pipefail
          if [ -z "${CM_KEYSTORE:-}" ]; then
            echo "ERROR: CM_KEYSTORE is missing (base64 keystore)."
            echo "Codemagic → App → Environment variables:"
            echo "  CM_KEYSTORE (base64 .jks)"
            echo "  CM_KEYSTORE_PASSWORD"
            echo "  CM_KEY_ALIAS"
            echo "  CM_KEY_PASSWORD"
            exit 1
          fi
          echo "$CM_KEYSTORE" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${CM_KEYSTORE_PASSWORD}
          keyPassword=${CM_KEY_PASSWORD}
          keyAlias=${CM_KEY_ALIAS}
          storeFile=app/upload-keystore.jks
          EOF
          echo "Keystore written: android/app/upload-keystore.jks"
          echo "key.properties written: android/key.properties"
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release --android-skip-build-dependency-validation \
            --dart-define=API_BASE_URL="${API_BASE_URL:-https://geva-backend.onrender.com/api}" \
            --dart-define=PREFER_DEV_AUTH=false
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/flutter-apk/app-release.apk
